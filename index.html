<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>City Stress Dashboard - Login</title>
        <link rel="stylesheet" href="style.css">
        </head>
        <body class="login-page">
          <!-- Dark mode toggle -->
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
              <div class="login-container">
                  <div class="login-box">
                        <div class="login-header">
                                <h1>🏙️ City Stress Dashboard</h1>
                                        <p>Real-time Urban Health Monitor</p>
                                              </div>
                                              
                                                    <div id="backendError" style="display:none; background:#fee; padding:12px; border-radius:6px; margin-bottom:20px; color:#c33; border:1px solid #fcc; font-size:12px;">
                                                            <strong>⚠️ Backend Connection Failed</strong><br/>
                                                                    <div id="errorDetail" style="margin-top:8px; font-size:11px;"></div>
                                                                            <button type="button" id="testBackendBtn" style="margin-top:8px; padding:6px 12px; background:#667eea; color:white; border:none; border-radius:4px; cursor:pointer; font-size:11px;">Test Backend Connection</button>
                                                                                  </div>
                                                                                  
                                                                                        <form id="loginForm">
                                                                                                <div class="form-group">
                                                                                                          <label for="email">📧 Email</label>
                                                                                                                    <input type="email" id="email" placeholder="Enter your email" required>
                                                                                                                              <span class="error-msg" id="emailError"></span>
                                                                                                                                      </div>
                                                                                                                                      
                                                                                                                                              <div class="form-group">
                                                                                                                                                        <label for="password">🔒 Password</label>
                                                                                                                                                                  <input type="password" id="password" placeholder="Enter your password" required>
                                                                                                                                                                            <span class="error-msg" id="passwordError"></span>
                                                                                                                                                                                    </div>
                                                                                                                                                                                    
                                                                                                                                                                                            <div class="form-group">
                                                                                                                                                                                                      <label for="state">🏷️ Select State/UT</label>
                                                                                                                                                                                                                <select id="state" required>
                                                                                                                                                                                                                            <option value="">-- Choose a State/UT --</option>
                                                                                                                                                                                                                                      </select>
                                                                                                                                                                                                                                                <div style="margin-top:6px;font-size:13px;color:#666;">Loaded states: <span id="stateCount">0</span></div>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                                                                                          <label for="district">🏛️ Select District</label>
                                                                                                                                                                                                                                                                                    <select id="district" required>
                                                                                                                                                                                                                                                                                                <option value="">-- Choose a District --</option>
                                                                                                                                                                                                                                                                                                          </select>
                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                          <div class="form-group">
                                                                                                                                                                                                                                                                                                                                    <label for="city">🗺️ Select City</label>
                                                                                                                                                                                                                                                                                                                                              <select id="city" required>
                                                                                                                                                                                                                                                                                                                                                          <option value="">-- Choose a City --</option>
                                                                                                                                                                                                                                                                                                                                                                    </select>
                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                    <button type="submit" class="login-btn">Login</button>
                                                                                                                                                                                                                                                                                                                                                                                          </form>
                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                <p class="signup-link">New user? <a href="#signup">Create an account</a></p>
                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                        <!-- load maps and location manager early so other scripts can use them -->
                                                                                                                                                                                                                                                                                                                                                                                                          <script src="data.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                            <script src="locationManager.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                              <script src="apiService.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                                                                                    // ====== DARK MODE TOGGLE ======
                                                                                                                                                                                                                                                                                                                                                                                                                        const themeToggle = document.getElementById('themeToggle');
                                                                                                                                                                                                                                                                                                                                                                                                                            const savedTheme = localStorage.getItem('theme') || 'light';
                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                    if (savedTheme === 'dark') {
                                                                                                                                                                                                                                                                                                                                                                                                                                          document.body.classList.add('dark-mode');
                                                                                                                                                                                                                                                                                                                                                                                                                                                themeToggle.textContent = '☀️';
                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                            themeToggle.addEventListener('click', function() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.body.classList.toggle('dark-mode');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const isDark = document.body.classList.contains('dark-mode');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              localStorage.setItem('theme', isDark ? 'dark' : 'light');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    themeToggle.textContent = isDark ? '☀️' : '🌙';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Test backend connection with timeout and retry
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function testBackendConnection(retries = 3) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      let lastError = null;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  for (let attempt = 1; attempt <= retries; attempt++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    console.log(`[TEST] Attempt ${attempt}/${retries} - Checking backend health...`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const controller = new AbortController();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const timeout = setTimeout(() => controller.abort(), 5000); // 5 second timeout
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const response = await fetch('http://localhost:5000/api/health', {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  signal: controller.signal,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              method: 'GET'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            clearTimeout(timeout);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (!response.ok) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            throw new Error(`HTTP ${response.status}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const data = await response.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    console.log('[TEST] Health check response:', data);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              return { ok: true, data };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      } catch (error) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                lastError = error;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          console.error(`[TEST] Attempt ${attempt} failed:`, error.message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (attempt < retries) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          // Wait before retrying
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      await new Promise(resolve => setTimeout(resolve, 1000));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          console.error('[TEST] All attempts failed:', lastError);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                return { ok: false, error: lastError.message };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // wait for DOM and backend maps before wiring selectors
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.addEventListener('DOMContentLoaded', async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const backendError = document.getElementById('backendError');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const errorDetail = document.getElementById('errorDetail');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const testBtn = document.getElementById('testBackendBtn');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Check if we're being served from file:// (which blocks fetch)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const isFileProtocol = window.location.protocol === 'file:';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (isFileProtocol) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        errorDetail.innerHTML = `⚠️ You're opening the file directly (file://...).<br/><br/>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <strong>Solution:</strong> Open using a local server instead:<br/>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <code style="background:#f0f0f0; padding:2px 4px; border-radius:2px; display:block; margin:8px 0;">python -m http.server 8000</code>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Then open: <code style="background:#f0f0f0; padding:2px 4px; border-radius:2px;">http://localhost:8000/index.html</code>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              backendError.style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // Test backend first (with retries)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        console.log('[Init] Testing backend connection with retries...');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const healthCheck = await testBackendConnection(3);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (!healthCheck.ok) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.error('[Init] Backend is not available, using local data.js');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Don't show error - just use local data instead
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Load maps - will use backend if available, else fall back to local data
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              console.log('[Init] Loading location maps...');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      console.log('[Init] window.stateDistrictMap available?', !!window.stateDistrictMap);
